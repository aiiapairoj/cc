<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Project Structure Explorer | AI Pairoj</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-0:#070b14;
    --bg-1:#0d1322;
    --bg-2:#111a2e;
    --glass: rgba(20, 30, 50, 0.55);
    --glass-strong: rgba(25, 38, 62, 0.85);
    --border: rgba(120, 180, 255, 0.12);
    --border-strong: rgba(120, 180, 255, 0.25);
    --text: #e6eefb;
    --text-dim: #8da3c4;
    --text-mute: #5e7497;
    --cyan:#22d3ee;
    --cyan-soft:#67e8f9;
    --orange:#fb923c;
    --green:#4ade80;
    --blue:#60a5fa;
    --purple:#c084fc;
    --pink:#f472b6;
    --yellow:#fbbf24;
    --red:#f87171;
    --indigo:#818cf8;
    --gray:#94a3b8;
  }
  html, body { height:100%; }
  body {
    font-family:'Prompt', system-ui, sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(34,211,238,0.10), transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(192,132,252,0.08), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(120,180,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,180,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
    z-index:0;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  /* HEADER */
  .topbar {
    position:sticky; top:0; z-index:50;
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    background: linear-gradient(180deg, rgba(7,11,20,0.85), rgba(7,11,20,0.65));
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display:flex; align-items:center; gap:18px;
  }
  .logo {
    width:42px; height:42px; border-radius:11px;
    background: linear-gradient(135deg, #fb923c, #ea580c);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-weight:700; color:white; font-size:20px;
    box-shadow: 0 8px 24px rgba(251,146,60,0.35);
  }
  .title-block h1 {
    font-size:18px; font-weight:600; letter-spacing:-0.01em;
    background: linear-gradient(90deg, #fff, #67e8f9);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .title-block p {
    font-size:12px; color:var(--text-dim);
  }
  .topbar-actions {
    margin-left:auto; display:flex; gap:10px;
  }
  .pill {
    padding:6px 14px; font-size:12px; font-weight:500;
    background: var(--glass);
    border:1px solid var(--border);
    border-radius:999px;
    color:var(--text-dim);
    display:inline-flex; align-items:center; gap:6px;
  }
  .pill .dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); }

  /* LAYOUT */
  .layout {
    display:grid;
    grid-template-columns: 340px 1fr;
    gap:20px;
    padding:20px 24px 60px;
    position:relative; z-index:1;
    max-width:1600px; margin:0 auto;
  }

  /* SIDEBAR */
  .sidebar {
    position:sticky; top:80px;
    height: calc(100vh - 100px);
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  .sidebar-tabs {
    display:flex;
    background: rgba(0,0,0,0.25);
    border-bottom:1px solid var(--border);
  }
  .tab-btn {
    flex:1; padding:12px 14px;
    background:transparent; border:0; cursor:pointer;
    color:var(--text-dim); font-family:inherit;
    font-size:13px; font-weight:500;
    border-bottom:2px solid transparent;
    transition:all 0.2s;
  }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active {
    color:var(--cyan);
    border-bottom-color:var(--cyan);
    background: linear-gradient(180deg, transparent, rgba(34,211,238,0.05));
  }
  .tab-content { flex:1; overflow-y:auto; padding:14px 8px 14px 14px; }
  .tab-content::-webkit-scrollbar { width:6px; }
  .tab-content::-webkit-scrollbar-thumb { background: rgba(120,180,255,0.15); border-radius:3px; }
  .tab-content::-webkit-scrollbar-thumb:hover { background: rgba(120,180,255,0.3); }
  .tab-pane { display:none; }
  .tab-pane.active { display:block; }

  /* TREE */
  .tree-title {
    font-size:11px; text-transform:uppercase; letter-spacing:0.12em;
    color:var(--text-mute); margin: 4px 0 12px 6px; font-weight:600;
  }
  .tree { font-family:'JetBrains Mono', monospace; font-size:12.5px; }
  .tree-node {
    cursor:pointer;
    padding:5px 8px;
    border-radius:6px;
    display:flex; align-items:center; gap:6px;
    color:var(--text-dim);
    transition:all 0.15s;
    user-select:none;
    line-height:1.4;
  }
  .tree-node:hover {
    background: rgba(120,180,255,0.08);
    color:var(--text);
  }
  .tree-node.active {
    background: linear-gradient(90deg, rgba(34,211,238,0.18), rgba(34,211,238,0.04));
    color:var(--cyan-soft);
    border-left:2px solid var(--cyan);
    padding-left:6px;
  }
  .tree-node .ico { width:14px; flex-shrink:0; text-align:center; }
  .tree-node .arrow {
    width:10px; flex-shrink:0; color:var(--text-mute);
    transition: transform 0.2s;
    font-size:9px;
  }
  .tree-node.expanded .arrow { transform: rotate(90deg); }
  .tree-node.leaf .arrow { visibility:hidden; }
  .tree-children { display:none; padding-left:14px; border-left:1px dashed rgba(120,180,255,0.1); margin-left:11px; }
  .tree-children.open { display:block; }

  .ico-folder { color:var(--orange); }
  .ico-folder-cmd { color:var(--green); }
  .ico-folder-skill { color:var(--blue); }
  .ico-folder-agent { color:var(--purple); }
  .ico-folder-plugin { color:var(--indigo); }
  .ico-folder-src { color:var(--orange); }
  .ico-folder-test { color:var(--pink); }
  .ico-folder-docs { color:var(--cyan); }
  .ico-folder-script { color:var(--gray); }
  .ico-config { color:var(--orange); }
  .ico-md { color:var(--cyan); }
  .ico-code { color:var(--orange); }
  .ico-test { color:var(--pink); }

  /* SECTION LIST */
  .sec-list { display:flex; flex-direction:column; gap:5px; }
  .sec-btn {
    display:flex; align-items:center; gap:10px;
    width:100%; text-align:left;
    padding:9px 12px; border-radius:8px;
    background:transparent; border:1px solid transparent;
    color:var(--text-dim); cursor:pointer;
    font-family:inherit; font-size:13px;
    transition:all 0.15s;
  }
  .sec-btn:hover { background: rgba(120,180,255,0.06); color:var(--text); }
  .sec-btn.active {
    background: linear-gradient(90deg, rgba(34,211,238,0.15), rgba(34,211,238,0.02));
    border-color: rgba(34,211,238,0.3);
    color:var(--cyan-soft);
  }
  .sec-num {
    width:24px; height:24px; border-radius:7px;
    background: var(--glass-strong);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-weight:600; font-size:11px; color:var(--cyan);
    flex-shrink:0;
    border:1px solid var(--border-strong);
  }
  .sec-btn.active .sec-num {
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    color:white; border-color:transparent;
  }

  /* MAIN */
  .main {
    background: var(--glass);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border:1px solid var(--border);
    border-radius:18px;
    padding:32px 36px;
    min-height: calc(100vh - 100px);
  }
  .breadcrumb {
    font-size:12px; color:var(--text-mute);
    margin-bottom:14px;
    font-family:'JetBrains Mono', monospace;
  }
  .breadcrumb .sep { margin: 0 6px; opacity:0.5; }
  .breadcrumb .cur { color:var(--cyan); }
  .detail-head {
    display:flex; align-items:flex-start; gap:18px;
    padding-bottom:22px; margin-bottom:24px;
    border-bottom:1px solid var(--border);
  }
  .detail-icon {
    width:60px; height:60px; flex-shrink:0;
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:700;
    background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(96,165,250,0.15));
    border:1px solid rgba(34,211,238,0.3);
    color:var(--cyan);
    font-family:'JetBrains Mono', monospace;
  }
  .detail-title h2 {
    font-size:26px; font-weight:600; letter-spacing:-0.015em;
    margin-bottom:6px;
  }
  .detail-title .tagline {
    font-size:14px; color:var(--text-dim);
  }
  .badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .badge {
    font-size:11px; padding:3px 9px; border-radius:6px;
    background: rgba(34,211,238,0.12);
    color:var(--cyan-soft);
    border:1px solid rgba(34,211,238,0.25);
    font-weight:500;
  }
  .badge.orange { background:rgba(251,146,60,0.12); color:#fdba74; border-color:rgba(251,146,60,0.25); }
  .badge.green  { background:rgba(74,222,128,0.12); color:#86efac; border-color:rgba(74,222,128,0.25); }
  .badge.purple { background:rgba(192,132,252,0.12); color:#d8b4fe; border-color:rgba(192,132,252,0.25); }
  .badge.pink   { background:rgba(244,114,182,0.12); color:#f9a8d4; border-color:rgba(244,114,182,0.25); }
  .badge.yellow { background:rgba(251,191,36,0.12); color:#fcd34d; border-color:rgba(251,191,36,0.25); }
  .badge.red    { background:rgba(248,113,113,0.12); color:#fca5a5; border-color:rgba(248,113,113,0.25); }

  .section { margin-bottom:26px; }
  .section h3 {
    font-size:15px; font-weight:600;
    color:var(--cyan-soft);
    margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .section h3::before {
    content:''; width:3px; height:14px; border-radius:2px;
    background: linear-gradient(180deg, var(--cyan), var(--blue));
  }
  .section p { color:var(--text-dim); line-height:1.75; margin-bottom:10px; font-size:14px; }
  .section ul { list-style:none; }
  .section ul li {
    padding:8px 0 8px 22px;
    color:var(--text-dim);
    position:relative;
    font-size:14px;
    line-height:1.65;
  }
  .section ul li::before {
    content:'▸'; position:absolute; left:6px; top:8px;
    color:var(--cyan); font-size:12px;
  }
  .section ul li strong { color:var(--text); font-weight:600; }
  .section ul li code { color:var(--cyan-soft); }

  code, .code-inline {
    font-family:'JetBrains Mono', monospace;
    background: rgba(34,211,238,0.08);
    color:var(--cyan-soft);
    padding:2px 7px; border-radius:5px;
    font-size:0.88em;
    border:1px solid rgba(34,211,238,0.15);
  }
  .code-block {
    position:relative;
    background: linear-gradient(180deg, #060912, #0a1020);
    border:1px solid var(--border-strong);
    border-radius:10px;
    padding:18px 18px 18px 20px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    line-height:1.65;
    overflow-x:auto;
    margin: 12px 0;
    color:#cbd5e1;
  }
  .code-block::before {
    content: attr(data-lang);
    position:absolute; top:8px; right:14px;
    font-size:10px; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--text-mute);
  }
  .code-block .cmt { color:#64748b; font-style:italic; }
  .code-block .key { color:#f472b6; }
  .code-block .str { color:#86efac; }
  .code-block .num { color:#fbbf24; }
  .code-block .var { color:#67e8f9; }
  .code-block .fn  { color:#fdba74; }
  .copy-btn {
    position:absolute; top:8px; right:14px;
    background: rgba(34,211,238,0.1);
    color:var(--cyan-soft);
    border:1px solid rgba(34,211,238,0.25);
    padding:3px 10px; border-radius:5px;
    font-size:11px; cursor:pointer;
    font-family:inherit;
    opacity:0; transition:opacity 0.2s;
  }
  .code-block:hover .copy-btn { opacity:1; }
  .copy-btn:hover { background: rgba(34,211,238,0.2); }

  .tip-box, .warn-box, .info-box {
    border-radius:10px;
    padding:14px 16px 14px 18px;
    margin: 14px 0;
    font-size:13.5px;
    line-height:1.65;
    border-left:3px solid;
    display:flex; gap:12px; align-items:flex-start;
  }
  .tip-box { background: rgba(74,222,128,0.06); border-color:var(--green); color:#bbf7d0; }
  .warn-box { background: rgba(248,113,113,0.06); border-color:var(--red); color:#fecaca; }
  .info-box { background: rgba(96,165,250,0.06); border-color:var(--blue); color:#bfdbfe; }
  .tip-box .icon, .warn-box .icon, .info-box .icon { font-size:18px; flex-shrink:0; }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0; }
  .feat-card {
    background: rgba(20,30,50,0.5);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 16px;
  }
  .feat-card h4 {
    font-size:13px; font-weight:600; color:var(--cyan-soft);
    margin-bottom:6px; display:flex; align-items:center; gap:8px;
  }
  .feat-card p { font-size:12.5px; color:var(--text-dim); line-height:1.55; }

  table.compact {
    width:100%; border-collapse:collapse; margin:12px 0;
    font-size:13px;
  }
  table.compact th {
    background: rgba(34,211,238,0.08);
    color:var(--cyan); font-weight:600;
    padding:10px 12px; text-align:left;
    border-bottom:1px solid var(--border-strong);
    font-size:12px; text-transform:uppercase; letter-spacing:0.06em;
  }
  table.compact td {
    padding:10px 12px;
    border-bottom:1px solid var(--border);
    color:var(--text-dim);
    vertical-align:top;
  }
  table.compact tr:hover td { background: rgba(120,180,255,0.04); }
  table.compact td:first-child { color:var(--cyan-soft); font-family:'JetBrains Mono', monospace; font-size:12px; white-space:nowrap; }

  /* CONTEXT BAR */
  .ctx-bar {
    display:flex; flex-direction:column; gap:8px; margin: 16px 0;
  }
  .ctx-row { display:flex; align-items:center; gap:12px; }
  .ctx-row .lbl { width:80px; font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--text-mute); }
  .ctx-row .bar { flex:1; height:10px; border-radius:6px; background:rgba(255,255,255,0.04); overflow:hidden; }
  .ctx-row .fill { height:100%; border-radius:6px; }
  .ctx-row .lvl { font-size:12.5px; color:var(--text-dim); width:auto; }

  /* FOOTER */
  .footer {
    text-align:center;
    padding: 30px 20px 20px;
    color:var(--text-mute);
    font-size:12px;
    position:relative; z-index:1;
  }
  .footer .heart { color:var(--cyan); }

  @media (max-width: 1024px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position:relative; top:auto; height:auto; max-height:60vh; }
    .grid-2 { grid-template-columns: 1fr; }
    .detail-head { flex-direction:column; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">&gt;_</div>
  <div class="title-block">
    <h1>Claude Code — Project Structure Explorer</h1>
    <p>คู่มือโต้ตอบ • คลิกที่ Tree หรือ Section เพื่อดูรายละเอียด + ตัวอย่างใช้งาน</p>
  </div>
  <div class="topbar-actions">
    <span class="pill"><span class="dot"></span>v1.0 Interactive</span>
    <span class="pill">🇹🇭 ภาษาไทย</span>
  </div>
</header>

<main class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" data-tab="tree">📁 Project Tree</button>
      <button class="tab-btn" data-tab="sections">📚 15 Sections</button>
    </div>

    <div class="tab-content">
      <!-- TREE TAB -->
      <div class="tab-pane active" id="pane-tree">
        <div class="tree-title">📂 my_project/</div>
        <div class="tree" id="tree"></div>
      </div>

      <!-- SECTIONS TAB -->
      <div class="tab-pane" id="pane-sections">
        <div class="tree-title">15 SECTIONS OVERVIEW</div>
        <div class="sec-list" id="secList"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <section class="main" id="main">
    <!-- เนื้อหา populate ด้วย JS -->
  </section>
</main>

<footer class="footer">
  <p>⚡ <strong style="color:var(--cyan-soft)">Claude Code Project Structure Explorer</strong> · สร้างด้วย ❤️ <span class="heart">▮</span></p>
  <p style="margin-top:6px;">AI Pairoj — BUGpairoj Group · 2026</p>
</footer>

const treeEl = document.getElementById('tree');
const secListEl = document.getElementById('secList');
const mainEl = document.getElementById('main');

function renderTree(nodes, parent) {
  nodes.forEach(node => {
    const wrap = document.createElement('div');
    const item = document.createElement('div');
    item.className = 'tree-node' + (node.leaf ? ' leaf' : '');
    item.dataset.id = node.id;
    item.innerHTML = `
      <span class="arrow">▶</span>
      <span class="ico ${node.cls||''}">${node.icon}</span>
      <span class="lbl-text">${node.label}</span>
    `;
    wrap.appendChild(item);

    if (node.children && node.children.length) {
      const childWrap = document.createElement('div');
      childWrap.className = 'tree-children';
      renderTree(node.children, childWrap);
      wrap.appendChild(childWrap);
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        item.classList.toggle('expanded');
        childWrap.classList.toggle('open');
        showDetail(node.id);
        markActive(item);
      });
    } else {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        showDetail(node.id);
        markActive(item);
      });
    }
    parent.appendChild(wrap);
  });
}

function markActive(el) {
  document.querySelectorAll('.tree-node.active, .sec-btn.active').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function renderSections() {
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sec-btn';
    btn.dataset.id = 'sec-' + s.num;
    btn.innerHTML = `<span class="sec-num">${s.num.toString().padStart(2,'0')}</span><span><strong style="display:block;color:var(--text);font-size:13px;">${s.title}</strong><span style="font-size:11px;color:var(--text-mute);">${s.tag}</span></span>`;
    btn.addEventListener('click', () => {
      showSection(s.num);
      markActive(btn);
    });
    secListEl.appendChild(btn);
  });
}

function showDetail(id) {
  const c = TREE_CONTENT[id];
  if (!c) {
    mainEl.innerHTML = `
      <div class="breadcrumb"><span class="cur">${id}</span></div>
      <div class="detail-head">
        <div class="detail-icon">📄</div>
        <div class="detail-title">
          <h2>${id}</h2>
          <p class="tagline">รายละเอียดเพิ่มเติมกำลังเตรียม — กรุณาคลิกไฟล์/โฟลเดอร์อื่นด้านซ้าย</p>
        </div>
      </div>
      <p style="color:var(--text-dim)">ลองเลือกไฟล์อื่นจาก Project Tree หรือดูใน 15 Sections เพื่อเรียนรู้เพิ่มเติม</p>
    `;
    return;
  }
  renderContent(c);
}

function showSection(num) {
  const c = SECTION_CONTENT[num];
  if (c) renderContent(c);
}

function renderContent(c) {
  const crumbs = c.breadcrumb.map((b,i) => i === c.breadcrumb.length-1 ? `<span class="cur">${b}</span>` : `${b}<span class="sep">/</span>`).join('');
  const badges = (c.badges||[]).map(([txt,cls]) => `<span class="badge ${cls}">${txt}</span>`).join('');
  mainEl.innerHTML = `
    <div class="breadcrumb">${crumbs}</div>
    <div class="detail-head">
      <div class="detail-icon">${c.icon}</div>
      <div class="detail-title">
        <h2>${c.title}</h2>
        <p class="tagline">${c.tagline||''}</p>
        ${badges ? `<div class="badges">${badges}</div>`:''}
      </div>
    </div>
    ${c.body}
  `;
  mainEl.scrollTo({top:0, behavior:'smooth'});
  // attach copy buttons
  mainEl.querySelectorAll('.code-block').forEach(blk => {
    if (blk.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '📋 Copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(blk.innerText.replace(/📋 Copy/, '').trim());
      btn.textContent = '✅ Copied';
      setTimeout(() => btn.textContent = '📋 Copy', 1500);
    };
    blk.appendChild(btn);
  });
}

/* TAB SWITCHING */
document.querySelectorAll('.tab-btn').forEach(b => {

    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('pane-' + b.dataset.tab).classList.add('active');
  });
});
